            border-radius: 6px;

            font-weight: 600;
            transition: background 160ms ease, transform 80ms ease;

            background: var(--primary-dark);

            opacity: 0.6;

            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }

            text-decoration: none;
        }

        .login-container .forgot:hover {
            color: #004a99;
        }

        /* Ensure visible focus outlines for interactive elements */
        a:focus,

            margin-top: 12px;
            font-size: 0.95rem;
        }

        #loginMessage.success {
            color: green;
        }

        #loginMessage.error {
            color: red;
        }
