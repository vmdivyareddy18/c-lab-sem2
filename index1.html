<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Login demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        h1 {
            margin: 10px 0;
            color: #333;
        }

        p {
            margin: 10px 0;
            line-height: 1.5;
            color: #666;
        }

        /* Login styles */
        .login-container {
            max-width: 360px;
            margin: 24px 0;
            padding: 18px;
            border: 1px solid #e6e6e6;
            border-radius: 8px;
            background: #fafafa;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.03);
        }

        .login-container h2 {
            margin: 0 0 12px 0;
            font-size: 1.15rem;
            color: #222;
        }

        .login-container label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 6px;
            color: #444;
        }

        .login-container input[type="text"],
        .login-container input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .login-container button {
            width: 100%;
            padding: 10px;
            background: #0066cc;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }

        .login-container button:hover {
            background: #005bb5;
        }

        .login-container .form-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }

        .login-container .forgot {
            font-size: 0.85rem;
            color: #0066cc;
            text-decoration: none;
        }

        #loginMessage {
            margin-top: 12px;
            font-size: 0.95rem;
        }

        #loginMessage.success {
            color: green;
        }

        #loginMessage.error {
            color: red;
        }
    </style>
</head>

<body>
    <h1>Hello, World!</h1>
    <p>This is a simple HTML document.</p>
    <h3>Subheading</h3>
    <p>This is a paragraph under the subheading.</p>
    <a href="https://www.example.com">Visit Example.com</a>

    <!-- Login component -->
    <section class="login-container" aria-labelledby="loginTitle">
    <h2 id="loginTitle">Sign in to your account</h2>
    <p style="margin:6px 0 12px 0;color:#555;font-size:0.95rem;">Use your username or email to sign in. This is a demo login, no data is transmitted.</p>
        <form id="loginForm" novalidate>
            <label for="username">Username or email</label>
            <input id="username" name="username" type="text" required autocomplete="username"
                placeholder="you@example.com">

            <label for="password">Password</label>
            <input id="password" name="password" type="password" required autocomplete="current-password"
                placeholder="Enter your password">

            <button type="submit">Sign in</button>

            <div class="form-row">
                <label style="font-size:0.9rem;"><input type="checkbox" id="remember"> Remember me</label>
                <a class="forgot" href="#" title="Recover your password" aria-label="Forgot password">Forgot?</a>
            </div>

            <div id="loginMessage" role="status" aria-live="polite"></div>
        </form>
    </section>

    <script>
        // Demo client-side handler for the login component
        (function () {
            const form = document.getElementById('loginForm');
            const msg = document.getElementById('loginMessage');

            if (!form) return;

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                msg.textContent = '';
                msg.className = '';

                const username = form.username.value.trim();
                const password = form.password.value;

                if (!username || !password) {
                    msg.textContent = 'Please enter both username and password.';
                    msg.classList.add('error');
                    return;
                }

                // Demo validation: accept any non-empty credentials
                msg.textContent = 'Login successful (demo).';
                msg.classList.add('success');

                // Real apps: send credentials to the server here
                // fetch('/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username, password}) })
            });
        })();
    </script>
</body>

</html>
